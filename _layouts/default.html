<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="canonical" href="https://fr4nsyz.github.io{{ page_url }}">
  <title>{% if page_title %}{{ page_title }} — fr4nsyz{% else %}fr4nsyz{% endif %}</title>
  <meta name="title" content="{% if page_title %}{{ page_title }} — fr4nsyz{% else %}fr4nsyz{% endif %}">
  <meta name="description" content="{{ description | default('just another void pointer') }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://fr4nsyz.github.io{{ page_url }}">
  <meta property="og:title" content="{% if page_title %}{{ page_title }} — fr4nsyz{% else %}fr4nsyz{% endif %}">
  <meta property="og:description" content="{{ description | default('just another void pointer') }}">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="tmux-bar">
    <span class="tmux-session">[0]</span>
    <a href="/" class="tmux-win">0:Index</a>
    <a href="/#whoami" class="tmux-win">1:Home</a>
    <a href="/#experience" class="tmux-win">2:Experience</a>
    <a href="/#projects" class="tmux-win">3:Projects</a>
    <a href="/blog" class="tmux-win">4:Blog</a>
    <span class="tmux-right">fr4nsyz.github.io</span>
  </div>
  <div class="buffer">
    <div id="gutter" class="gutter" aria-hidden="true"></div>
    <div id="cursor"></div>
    <main>
      {{ content | safe }}
    </main>
  </div>
  <script>
    (function() {
      var gutter = document.getElementById('gutter');
      var cursorEl = document.getElementById('cursor');
      if (!gutter || !cursorEl) return;

      var lh, pt, bufTop;
      var cursorLine = 1, cursorCol = 0;
      var contentLines = 1;
      var fullText = '', wordStarts = [];

      function isWordChar(c) {
        return (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') ||
               (c >= '0' && c <= '9') || c === '_';
      }

      function initText() {
        var main = document.querySelector('main');
        if (!main) return;
        fullText = main.textContent || '';
        wordStarts = [];
        var inWord = false;
        for (var i = 0; i < fullText.length; i++) {
          if (isWordChar(fullText[i]) && !inWord) { wordStarts.push(i); inWord = true; }
          else if (!isWordChar(fullText[i])) inWord = false;
        }
      }

      function nextWordStart(from) {
        var i = Math.min(from, fullText.length);
        while (i < fullText.length && isWordChar(fullText[i])) i++;
        while (i < fullText.length && !isWordChar(fullText[i])) i++;
        return Math.min(i, fullText.length);
      }

      function prevWordStart(from) {
        if (from <= 0) return 0;
        var i = from - 1;
        if (isWordChar(fullText[i])) {
          while (i > 0 && isWordChar(fullText[i - 1])) i--;
        } else {
          while (i > 0 && !isWordChar(fullText[i])) i--;
          while (i > 0 && isWordChar(fullText[i - 1])) i--;
        }
        return i;
      }

      function wordEndCursor(from) {
        if (from >= fullText.length) return fullText.length;
        var i = from;
        while (i < fullText.length && !isWordChar(fullText[i])) i++;
        if (i >= fullText.length) return fullText.length;
        while (i < fullText.length && isWordChar(fullText[i])) i++;
        return i - 1;
      }

      function loadMetrics() {
        var cs = getComputedStyle(document.body);
        lh = parseFloat(cs.lineHeight) || 25.6;
        var buf = document.querySelector('.buffer');
        pt = parseFloat(getComputedStyle(buf).paddingTop) || 0;
      }

      function getContentLines() {
        var main = document.querySelector('main');
        return Math.max(1, Math.round((main ? main.offsetHeight : 1) / lh));
      }

      function getBufTop() {
        var buf = document.querySelector('.buffer');
        return buf.getBoundingClientRect().top + window.scrollY;
      }

      function refreshGutter() {
        var buf = document.querySelector('.buffer');
        var vh = window.innerHeight;
        var totalHeight = Math.max(buf.scrollHeight, vh);
        var totalLines = Math.ceil(totalHeight / lh);
        contentLines = getContentLines();

        var out = [];
        for (var i = 1; i <= totalLines; i++) {
          out.push(i <= contentLines ? i : '~');
        }
        gutter.textContent = out.join('\n');
      }

      function placeCursor() {
        cursorEl.style.top = ((cursorLine - 1) * lh) + 'px';
        cursorEl.style.left = (9 + cursorCol) + 'ch';
      }

      function centerView() {
        var vh = window.innerHeight;
        var dh = document.body.scrollHeight;
        var bufTop = getBufTop();
        var cursorY = bufTop + (cursorLine - 1) * lh + pt;
        var target = cursorY - vh / 2 + lh / 2;
        target = Math.max(0, Math.min(target, dh - vh));
        window.scrollTo({ top: Math.round(target) });
      }

      function move(delta) {
        var next = cursorLine + delta;
        if (next < 1 || next > contentLines || next === cursorLine) return;
        cursorLine = next;
        placeCursor();
        centerView();
      }

      function gotoLine(n) {
        n = Math.max(1, Math.min(n, contentLines));
        if (n === cursorLine) return;
        cursorLine = n;
        placeCursor();
        centerView();
      }

      function init() {
        loadMetrics();
        initText();
        refreshGutter();
        var vh = window.innerHeight;
        var viewLines = Math.floor(vh / lh);
        cursorLine = Math.min(Math.floor(viewLines / 2), contentLines);
        if (cursorLine < 1) cursorLine = 1;
        placeCursor();
        centerView();
      }

      function updateActiveTab() {
        var path = window.location.pathname;
        var hash = window.location.hash;
        var session = document.querySelector('.tmux-session');
        document.querySelectorAll('.tmux-win').forEach(function(a) {
          var href = a.getAttribute('href');
          var active = (href === path && !hash) ||
            (hash && href === path + hash) ||
            (href === '/blog' && path.startsWith('/blog'));
          a.classList.toggle('active', active);
          if (active && session)
            session.textContent = '[' + a.textContent.charAt(0) + ']';
        });
      }

      updateActiveTab();
      window.addEventListener('hashchange', function() {
        updateActiveTab();
        var hash = window.location.hash;
        var buf = document.querySelector('.buffer');
        if (!buf) return;
        var target = hash ? document.getElementById(hash.slice(1)) : document.querySelector('main > :first-child');
        if (!target) return;
        var heading = target.querySelector('h1, h2, h3, h4, h5, h6') || target;
        var headingY = heading.getBoundingClientRect().top + window.scrollY;
        var bufY = buf.getBoundingClientRect().top + window.scrollY;
        var lineNum = Math.max(1, Math.round((headingY - bufY - pt) / lh) + 1);
        gotoLine(lineNum);
      });

      init();

      var lastKey, ggTimer;
      document.addEventListener('keydown', function(e) {
        if (e.target.matches('input, textarea, [contenteditable]')) return;
        if (e.key === 'j') { e.preventDefault(); move(1); return; }
        if (e.key === 'k') { e.preventDefault(); move(-1); return; }
        if (e.key === 'G') { e.preventDefault(); gotoLine(contentLines); return; }
        if (e.ctrlKey && e.key === 'd') { e.preventDefault(); move(Math.floor(window.innerHeight / lh / 2)); return; }
        if (e.ctrlKey && e.key === 'u') { e.preventDefault(); move(-Math.floor(window.innerHeight / lh / 2)); return; }
        if (e.key === 'h') { e.preventDefault(); cursorCol = Math.max(0, cursorCol - 1); placeCursor(); return; }
        if (e.key === 'l') { e.preventDefault(); cursorCol = Math.min(fullText.length, cursorCol + 1); placeCursor(); return; }
        if (e.key === 'w') { e.preventDefault(); cursorCol = nextWordStart(cursorCol + 1); placeCursor(); return; }
        if (e.key === 'b') { e.preventDefault(); cursorCol = prevWordStart(cursorCol); placeCursor(); return; }
        if (e.key === 'e') { e.preventDefault(); cursorCol = wordEndCursor(cursorCol + 1); placeCursor(); return; }
        if (/^[0-4]$/.test(e.key)) {
          var links = document.querySelectorAll('.tmux-win');
          var idx = parseInt(e.key);
          if (links[idx]) { e.preventDefault(); window.location.href = links[idx].getAttribute('href'); }
          return;
        }
        if (e.key === 'g') {
          e.preventDefault();
          if (lastKey === 'g') {
            clearTimeout(ggTimer);
            lastKey = null;
            gotoLine(1);
          } else {
            lastKey = 'g';
            ggTimer = setTimeout(function() { lastKey = null; }, 400);
          }
        }
      });

      var rt;
      window.addEventListener('resize', function() {
        clearTimeout(rt);
        rt = setTimeout(function() {
          loadMetrics();
          refreshGutter();
          placeCursor();
          centerView();
        }, 100);
      });
    })();
  </script>
</body>
</html>
