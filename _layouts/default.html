<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="canonical" href="https://fr4nsyz.github.io{{ page_url }}">
  <title>{% if page_title %}{{ page_title }} — fr4nsyz{% else %}fr4nsyz{% endif %}</title>
  <meta name="title" content="{% if page_title %}{{ page_title }} — fr4nsyz{% else %}fr4nsyz{% endif %}">
  <meta name="description" content="{{ description | default('just another void pointer') }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://fr4nsyz.github.io{{ page_url }}">
  <meta property="og:title" content="{% if page_title %}{{ page_title }} — fr4nsyz{% else %}fr4nsyz{% endif %}">
  <meta property="og:description" content="{{ description | default('just another void pointer') }}">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="tmux-bar">
    <span class="tmux-session">[101]</span>
    <a href="/" class="tmux-win">0:Index</a>
    <a href="/#whoami" class="tmux-win">1:STAT</a>
    <a href="/#experience" class="tmux-win">2:PERKS</a>
    <a href="/#projects" class="tmux-win">3:INV</a>
    <a href="/blog" class="tmux-win">4:DATA</a>
    <span class="tmux-right">PIP-BOY 3000</span>
  </div>
  <div class="buffer">
    <div id="gutter" class="gutter" aria-hidden="true"></div>
    <div id="crt-overlay"></div>
    <div id="cursor"></div>
    <main>
      {{ content | safe }}
    </main>
  </div>
  <script>
    (function() {
      var gutter = document.getElementById('gutter');
      var cursorEl = document.getElementById('cursor');
      if (!gutter || !cursorEl) return;

      var lh, pt, bufTop;
      var cursorLine = 1, cursorCol = 0;
      var contentLines = 1;
      var fullText = '';

      function isWordChar(c) {
        return (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') ||
               (c >= '0' && c <= '9') || c === '_';
      }

      function initText() {
        var main = document.querySelector('main');
        if (!main) return;
        fullText = main.textContent || '';
      }

      function nextWordStart(pos) {
        var i = pos;
        if (i >= fullText.length) return fullText.length;
        while (i < fullText.length && fullText[i] === ' ') i++;
        if (i >= fullText.length) return fullText.length;
        var type = isWordChar(fullText[i]) ? 1 : 0;
        while (i < fullText.length && fullText[i] !== ' ' && (type ? isWordChar(fullText[i]) : !isWordChar(fullText[i]))) i++;
        while (i < fullText.length && fullText[i] === ' ') i++;
        return i;
      }

      function prevWordStart(pos) {
        if (pos <= 0) return 0;
        var i = pos;
        while (i > 0 && fullText[i - 1] === ' ') i--;
        if (i === 0) return 0;
        var type = isWordChar(fullText[i - 1]) ? 1 : 0;
        while (i > 0 && fullText[i - 1] !== ' ' && (type ? isWordChar(fullText[i - 1]) : !isWordChar(fullText[i - 1]))) i--;
        return i;
      }

      function wordEndAt(pos) {
        if (pos >= fullText.length) return fullText.length - 1;
        while (pos < fullText.length && fullText[pos] === ' ') pos++;
        if (pos >= fullText.length) return fullText.length - 1;
        var type = isWordChar(fullText[pos]) ? 1 : 0;
        while (pos < fullText.length && fullText[pos] !== ' ' && (type ? isWordChar(fullText[pos]) : !isWordChar(fullText[pos]))) pos++;
        return pos - 1;
      }

      function wordEndCursor(pos) {
        var end = wordEndAt(pos);
        if (pos >= end) {
          var j = end + 1;
          while (j < fullText.length && fullText[j] === ' ') j++;
          return j >= fullText.length ? (fullText.length - 1) : wordEndAt(j);
        }
        return end;
      }

      function lineBegin() {
        var i = cursorCol;
        while (i > 0 && fullText[i - 1] !== '\n') i--;
        while (i < fullText.length && fullText[i] === ' ') i++;
        return i;
      }

      function lineEnd() {
        var i = cursorCol;
        while (i < fullText.length && fullText[i] !== '\n') i++;
        return i;
      }

      var audio = (function() {
        var ctx = null;
        function getCtx() {
          if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
          return ctx;
        }
        function beep(freq, dur, type, vol) {
          try {
            var c = getCtx();
            var o = c.createOscillator();
            var g = c.createGain();
            o.type = type || 'square';
            o.frequency.value = freq;
            g.gain.setValueAtTime(vol || 0.03, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + dur);
          } catch(e) {}
        }
        return {
          move: function() { beep(880, 0.04, 'square', 0.025); },
          scroll: function() { beep(440, 0.06, 'sawtooth', 0.025); },
          menu: function() { beep(1100, 0.035, 'square', 0.02); },
          edge: function() { beep(220, 0.08, 'sawtooth', 0.03); }
        };
      })();

      function loadMetrics() {
        var cs = getComputedStyle(document.body);
        lh = parseFloat(cs.lineHeight) || 25.6;
        var buf = document.querySelector('.buffer');
        pt = parseFloat(getComputedStyle(buf).paddingTop) || 0;
      }

      function getContentLines() {
        var main = document.querySelector('main');
        return Math.max(1, Math.round((main ? main.offsetHeight : 1) / lh));
      }

      function getBufTop() {
        var buf = document.querySelector('.buffer');
        return buf.getBoundingClientRect().top + window.scrollY;
      }

      function refreshGutter() {
        var buf = document.querySelector('.buffer');
        var vh = window.innerHeight;
        var totalHeight = Math.max(buf.scrollHeight, vh);
        var totalLines = Math.ceil(totalHeight / lh);
        contentLines = getContentLines();

        var out = [];
        for (var i = 1; i <= totalLines; i++) {
          out.push(i <= contentLines ? i : '~');
        }
        gutter.textContent = out.join('\n');
      }

      function placeCursor() {
        cursorEl.style.top = ((cursorLine - 1) * lh) + 'px';
        cursorEl.style.left = (9 + cursorCol) + 'ch';
      }

      function centerView() {
        var vh = window.innerHeight;
        var dh = document.body.scrollHeight;
        var bufTop = getBufTop();
        var cursorY = bufTop + (cursorLine - 1) * lh + pt;
        var target = cursorY - vh / 2 + lh / 2;
        target = Math.max(0, Math.min(target, dh - vh));
        window.scrollTo({ top: Math.round(target) });
      }

      function move(delta) {
        var next = cursorLine + delta;
        if (next < 1 || next > contentLines || next === cursorLine) return;
        cursorLine = next;
        placeCursor();
        centerView();
      }

      function gotoLine(n) {
        n = Math.max(1, Math.min(n, contentLines));
        if (n === cursorLine) return;
        cursorLine = n;
        placeCursor();
        centerView();
      }

      function init() {
        loadMetrics();
        initText();
        refreshGutter();
        var vh = window.innerHeight;
        var viewLines = Math.floor(vh / lh);
        cursorLine = Math.min(Math.floor(viewLines / 2), contentLines);
        if (cursorLine < 1) cursorLine = 1;
        placeCursor();
        centerView();
      }

      function updateActiveTab() {
        var path = window.location.pathname;
        var hash = window.location.hash;
        var session = document.querySelector('.tmux-session');
        document.querySelectorAll('.tmux-win').forEach(function(a) {
          var href = a.getAttribute('href');
          var active = (href === path && !hash) ||
            (hash && href === path + hash) ||
            (href === '/blog' && path.startsWith('/blog'));
          a.classList.toggle('active', active);
          if (active && session)
            session.textContent = '[' + a.textContent.charAt(0) + ']';
        });
      }

      updateActiveTab();
      window.addEventListener('hashchange', function() {
        updateActiveTab();
        var hash = window.location.hash;
        var buf = document.querySelector('.buffer');
        if (!buf) return;
        var target = hash ? document.getElementById(hash.slice(1)) : document.querySelector('main > :first-child');
        if (!target) return;
        var heading = target.querySelector('h1, h2, h3, h4, h5, h6') || target;
        var headingY = heading.getBoundingClientRect().top + window.scrollY;
        var bufY = buf.getBoundingClientRect().top + window.scrollY;
        var lineNum = Math.max(1, Math.round((headingY - bufY - pt) / lh) + 1);
        gotoLine(lineNum);
      });

      init();

      var lastKey, ggTimer;
      document.addEventListener('keydown', function(e) {
        if (e.target.matches('input, textarea, [contenteditable]')) return;
        if (e.key === 'j') { e.preventDefault(); audio.move(); move(1); return; }
        if (e.key === 'k') { e.preventDefault(); audio.move(); move(-1); return; }
        if (e.key === 'G') { e.preventDefault(); audio.scroll(); gotoLine(contentLines); return; }
        if (e.ctrlKey && e.key === 'd') { e.preventDefault(); audio.scroll(); move(Math.floor(window.innerHeight / lh / 2)); return; }
        if (e.ctrlKey && e.key === 'u') { e.preventDefault(); audio.scroll(); move(-Math.floor(window.innerHeight / lh / 2)); return; }
        if (e.key === 'h') { e.preventDefault(); var pc = cursorCol; cursorCol = Math.max(0, cursorCol - 1); if (cursorCol !== pc) audio.move(); placeCursor(); return; }
        if (e.key === 'l') { e.preventDefault(); var pc = cursorCol; cursorCol = Math.min(fullText.length, cursorCol + 1); if (cursorCol !== pc) audio.move(); placeCursor(); return; }
        if (e.key === 'w') { e.preventDefault(); var pc = cursorCol; cursorCol = nextWordStart(cursorCol); if (cursorCol !== pc) audio.move(); placeCursor(); return; }
        if (e.key === 'b') { e.preventDefault(); var pc = cursorCol; cursorCol = prevWordStart(cursorCol); if (cursorCol !== pc) audio.move(); placeCursor(); return; }
        if (e.key === 'e') { e.preventDefault(); var pc = cursorCol; cursorCol = wordEndCursor(cursorCol); if (cursorCol !== pc) audio.move(); placeCursor(); return; }
        if (e.key === '_') { e.preventDefault(); cursorCol = lineBegin(); audio.move(); placeCursor(); return; }
        if (e.key === '$') { e.preventDefault(); cursorCol = lineEnd(); audio.move(); placeCursor(); return; }
        if (/^[0-4]$/.test(e.key)) {
          audio.menu();
          var links = document.querySelectorAll('.tmux-win');
          var idx = parseInt(e.key);
          if (links[idx]) { e.preventDefault(); window.location.href = links[idx].getAttribute('href'); }
          return;
        }
        if (e.key === 'g') {
          e.preventDefault();
          if (lastKey === 'g') {
            clearTimeout(ggTimer);
            lastKey = null;
            audio.scroll();
            gotoLine(1);
          } else {
            lastKey = 'g';
            ggTimer = setTimeout(function() { lastKey = null; }, 400);
          }
        }
      });
      document.querySelectorAll('.tmux-win').forEach(function(a) {
        a.addEventListener('click', audio.menu);
      });

      var rt;
      window.addEventListener('resize', function() {
        clearTimeout(rt);
        rt = setTimeout(function() {
          loadMetrics();
          refreshGutter();
          placeCursor();
          centerView();
        }, 100);
      });
    })();
  </script>
</body>
</html>
