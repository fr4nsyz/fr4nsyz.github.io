---
layout: default
title: "Blog"
description: "Blog posts"
---

<h1 class="text-accent">Blog</h1>
<ul class="list-none p-0 mt-6">
  {% for post in posts %}
  <li class="mb-6">
    <a href="{{ post.url }}" class="group relative block pl-4 border-l-2 border-[rgba(255,42,42,0.4)] overflow-hidden transition-all duration-300 hover:translate-x-2 no-underline">
      <div class="absolute inset-0 -translate-x-full group-hover:translate-x-0 bg-gradient-to-r from-transparent via-[rgba(255,42,42,0.1)] to-transparent transition-transform duration-500 ease-out pointer-events-none"></div>
      <strong class="text-accent">{{ post.title }}</strong>
      <p class="text-sm text-[rgb(var(--gray))] mt-1 mb-2">{{ post.description }}</p>
      <div class="flex items-center gap-3">
        <span class="text-xs text-[rgb(var(--gray))]"><time datetime="{{ post.date_xml }}">{{ post.date_formatted }}</time></span>
        {% for tag in post.tags %}
        <span class="text-xs px-2 py-1 rounded-full bg-[rgba(var(--gray-light),0.3)] text-[rgb(var(--gray-dark))] border border-[rgba(255,42,42,0.2)]">{{ tag }}</span>
        {% endfor %}
      </div>
    </a>
  </li>
  {% endfor %}
</ul>
